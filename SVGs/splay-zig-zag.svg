<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Splay zig-zag — два поворота в разные стороны</title>
  <desc id="desc">Учебная схема: Splay zig-zag — два поворота в разные стороны</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="420" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#555;stroke-width:2;fill:none;stroke-dasharray:5 5}
    .node{stroke:#111;stroke-width:2.2;fill:#fff}
    .hl{fill:#e8f2ff}
    .new{fill:#dff5e3}
    .warn{fill:#fff1c7}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .ghost{fill:#f5f5f5;stroke:#555;stroke-width:2;stroke-dasharray:5 4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .small{font-size:14px}
    .label{font-size:17px}
    .title{font-size:20px;font-weight:700}
    .white{fill:#fff}
    .redText{fill:#b00020;font-weight:700}
    .greenText{fill:#147a2e;font-weight:700}
    .muted{fill:#555}
  </style>

  <text class="title" x="215" y="28">До: x — правый ребёнок p, p — левый ребёнок g</text>
  <text class="title" x="645" y="28">После: x между p и g</text>
  <line class="line" x1="215" y1="82" x2="125" y2="150"/>
  <line class="line" x1="215" y1="82" x2="305" y2="150"/>
  <line class="line" x1="125" y1="195" x2="75" y2="255"/>
  <line class="line" x1="125" y1="195" x2="175" y2="255"/>
  <line class="line" x1="175" y1="300" x2="145" y2="350"/>
  <line class="line" x1="175" y1="300" x2="205" y2="350"/>
  <circle class="node" cx="215" cy="70" r="24"/>
  <text class="" x="215" y="70">g</text>
  <circle class="node warn" cx="125" cy="175" r="24"/>
  <text class="" x="125" y="175">p</text>
  <circle class="ghost" cx="305" cy="175" r="22"/>
  <text class="small" x="305" y="175">D</text>
  <circle class="ghost" cx="75" cy="275" r="22"/>
  <text class="small" x="75" y="275">A</text>
  <circle class="node new" cx="175" cy="275" r="24"/>
  <text class="" x="175" y="275">x</text>
  <circle class="ghost" cx="145" cy="365" r="22"/>
  <text class="small" x="145" y="365">B</text>
  <circle class="ghost" cx="205" cy="365" r="22"/>
  <text class="small" x="205" y="365">C</text>
  <path class="line" d="M 390 200 C 455 135, 505 135, 560 185" marker-end="url(#arrow)"/>
  <text class="small" x="425" y="120">левый(p), правый(g)</text>
  <line class="line" x1="645" y1="82" x2="555" y2="150"/>
  <line class="line" x1="645" y1="82" x2="735" y2="150"/>
  <line class="line" x1="555" y1="195" x2="515" y2="255"/>
  <line class="line" x1="555" y1="195" x2="595" y2="255"/>
  <line class="line" x1="735" y1="195" x2="695" y2="255"/>
  <line class="line" x1="735" y1="195" x2="775" y2="255"/>
  <circle class="node new" cx="645" cy="70" r="24"/>
  <text class="" x="645" y="70">x</text>
  <circle class="node warn" cx="555" cy="175" r="24"/>
  <text class="" x="555" y="175">p</text>
  <circle class="node" cx="735" cy="175" r="24"/>
  <text class="" x="735" y="175">g</text>
  <circle class="ghost" cx="515" cy="275" r="22"/>
  <text class="small" x="515" y="275">A</text>
  <circle class="ghost" cx="595" cy="275" r="22"/>
  <text class="small" x="595" y="275">B</text>
  <circle class="ghost" cx="695" cy="275" r="22"/>
  <text class="small" x="695" y="275">C</text>
  <circle class="ghost" cx="775" cy="275" r="22"/>
  <text class="small" x="775" y="275">D</text>

</svg>
