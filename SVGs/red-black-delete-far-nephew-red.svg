<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" width="940" height="430" role="img" aria-labelledby="title desc">
  <title id="title">Red-Black delete fixup — дальний племянник красный</title>
  <desc id="desc">Случай двойной черноты: брат черный и дальний ребенок брата красный. Поворот вокруг родителя и перекраска завершают исправление.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .blue{fill:#e8f2ff;stroke:#111;stroke-width:2.2}
    .db{fill:#fff;stroke:#111;stroke-width:4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:17px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:20px;font-weight:700}
    .small{font-size:14px}
    .white{fill:#fff}
    .greenText{fill:#147a2e;font-weight:700}
  </style>
  <text class="title" x="235" y="28">До: дальний ребенок B красный</text>
  <text class="title" x="705" y="28">После: поворот left(P), исправлено</text>
  <line class="line" x1="235" y1="82" x2="135" y2="150"/>
  <line class="line" x1="235" y1="82" x2="335" y2="150"/>
  <line class="line" x1="335" y1="195" x2="285" y2="255"/>
  <line class="line" x1="335" y1="195" x2="385" y2="255"/>
  <circle class="blue" cx="235" cy="70" r="24"/><text x="235" y="70">P</text>
  <circle class="db" cx="135" cy="175" r="24"/><text x="135" y="175">X</text>
  <circle class="black" cx="335" cy="175" r="24"/><text class="white" x="335" y="175">S</text>
  <circle class="black" cx="285" cy="275" r="22"/><text class="white" x="285" y="275">A</text>
  <circle class="red" cx="385" cy="275" r="22"/><text class="white" x="385" y="275">B</text>
  <path class="line" d="M 430 190 C 505 130, 580 130, 650 170" marker-end="url(#arrow)"/>
  <text class="small" x="535" y="115">rotate left(P)</text>
  <line class="line" x1="705" y1="82" x2="605" y2="150"/>
  <line class="line" x1="705" y1="82" x2="805" y2="150"/>
  <line class="line" x1="605" y1="195" x2="555" y2="255"/>
  <line class="line" x1="605" y1="195" x2="655" y2="255"/>
  <circle class="blue" cx="705" cy="70" r="24"/><text x="705" y="70">S</text>
  <circle class="black" cx="605" cy="175" r="24"/><text class="white" x="605" y="175">P</text>
  <circle class="black" cx="805" cy="175" r="24"/><text class="white" x="805" y="175">B</text>
  <circle class="black" cx="555" cy="275" r="22"/><text class="white" x="555" y="275">X</text>
  <circle class="black" cx="655" cy="275" r="22"/><text class="white" x="655" y="275">A</text>
  <text class="greenText" x="705" y="345">S получает старый цвет P, P и B становятся черными</text>
</svg>
