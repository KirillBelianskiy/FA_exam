<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Вставка в декартово дерево с поворотом</title>
  <desc id="desc">Учебная схема: вставка в декартово дерево и восстановление свойства кучи</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="420" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#555;stroke-width:2;fill:none;stroke-dasharray:5 5}
    .node{stroke:#111;stroke-width:2.2;fill:#fff}
    .hl{fill:#e8f2ff}
    .new{fill:#dff5e3}
    .warn{fill:#fff1c7}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .ghost{fill:#f5f5f5;stroke:#555;stroke-width:2;stroke-dasharray:5 4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .small{font-size:14px}
    .label{font-size:17px}
    .title{font-size:20px;font-weight:700}
    .white{fill:#fff}
    .redText{fill:#b00020;font-weight:700}
    .greenText{fill:#147a2e;font-weight:700}
    .muted{fill:#555}
  </style>

  <text class="title" x="215" y="28">После вставки по ключу: приоритет нарушен</text>
  <text class="title" x="645" y="28">После поворота: куча восстановлена</text>
  <line class="line" x1="215" y1="92" x2="125" y2="160"/>
  <line class="line" x1="215" y1="92" x2="305" y2="160"/>
  <line class="line" x1="305" y1="205" x2="255" y2="265"/>
  <circle class="node" cx="215" cy="80" r="34"/>
  <text class="small" x="215" y="80">50 / 12</text>
  <circle class="node" cx="125" cy="185" r="34"/>
  <text class="small" x="125" y="185">30 / 18</text>
  <circle class="node warn" cx="305" cy="185" r="34"/>
  <text class="small" x="305" y="185">70 / 20</text>
  <circle class="node new" cx="255" cy="285" r="34"/>
  <text class="small" x="255" y="285">60 / 15</text>
  <text class="redText" x="286" y="330">15 &lt; 20: узел должен подняться</text>
  <path class="line" d="M 390 205 C 455 140, 505 140, 560 190" marker-end="url(#arrow)"/>
  <text class="small" x="430" y="122">правый поворот(70)</text>
  <line class="line" x1="645" y1="92" x2="555" y2="160"/>
  <line class="line" x1="645" y1="92" x2="735" y2="160"/>
  <line class="line" x1="735" y1="205" x2="695" y2="265"/>
  <circle class="node" cx="645" cy="80" r="34"/>
  <text class="small" x="645" y="80">50 / 12</text>
  <circle class="node" cx="555" cy="185" r="34"/>
  <text class="small" x="555" y="185">30 / 18</text>
  <circle class="node new" cx="735" cy="185" r="34"/>
  <text class="small" x="735" y="185">60 / 15</text>
  <circle class="node" cx="695" cy="285" r="34"/>
  <text class="small" x="695" y="285">70 / 20</text>
  <text class="greenText" x="645" y="360">Поворот сохраняет порядок ключей и исправляет приоритет</text>

</svg>
