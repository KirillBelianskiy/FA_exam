<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" width="940" height="460" role="img" aria-labelledby="title desc">
  <title id="title">Red-Black delete fixup — ближний племянник красный</title>
  <desc id="desc">Случай двойной черноты: брат черный, ближний ребенок брата красный, дальний черный. Сначала поворот у брата.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect width="940" height="460" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .db{fill:#fff;stroke:#111;stroke-width:4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:17px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:20px;font-weight:700}
    .small{font-size:14px}
    .white{fill:#fff}
    .greenText{fill:#147a2e;font-weight:700}
  </style>
  <text class="title" x="235" y="28">До: ближний ребенок A красный</text>
  <text class="title" x="705" y="28">После: поворот right(S)</text>
  <line class="line" x1="235" y1="82" x2="135" y2="150"/>
  <line class="line" x1="235" y1="82" x2="335" y2="150"/>
  <line class="line" x1="335" y1="195" x2="285" y2="255"/>
  <line class="line" x1="335" y1="195" x2="385" y2="255"/>
  <circle class="black" cx="235" cy="70" r="24"/><text class="white" x="235" y="70">P</text>
  <circle class="db" cx="135" cy="175" r="24"/><text x="135" y="175">X</text>
  <circle class="black" cx="335" cy="175" r="24"/><text class="white" x="335" y="175">S</text>
  <circle class="red" cx="285" cy="275" r="22"/><text class="white" x="285" y="275">A</text>
  <circle class="black" cx="385" cy="275" r="22"/><text class="white" x="385" y="275">B</text>
  <path class="line" d="M 430 190 C 505 130, 580 130, 650 170" marker-end="url(#arrow)"/>
  <text class="small" x="535" y="115">rotate right(S)</text>
  <line class="line" x1="705" y1="82" x2="605" y2="150"/>
  <line class="line" x1="705" y1="82" x2="805" y2="150"/>
  <line class="line" x1="805" y1="195" x2="855" y2="255"/>
  <line class="line" x1="855" y1="297" x2="895" y2="335"/>
  <circle class="black" cx="705" cy="70" r="24"/><text class="white" x="705" y="70">P</text>
  <circle class="db" cx="605" cy="175" r="24"/><text x="605" y="175">X</text>
  <circle class="black" cx="805" cy="175" r="24"/><text class="white" x="805" y="175">A</text>
  <circle class="red" cx="855" cy="275" r="22"/><text class="white" x="855" y="275">S</text>
  <circle class="black" cx="895" cy="355" r="21"/><text class="white" x="895" y="355">B</text>
  <text class="greenText" x="705" y="415">Случай превращается в случай с дальним красным ребенком</text>
</svg>
