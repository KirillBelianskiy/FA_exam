<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Удаление листа в дереве двоичного поиска</title>
  <desc id="desc">Учебная схема: удаление листа в дереве двоичного поиска</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="360" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#555;stroke-width:2;fill:none;stroke-dasharray:5 5}
    .node{stroke:#111;stroke-width:2.2;fill:#fff}
    .hl{fill:#e8f2ff}
    .new{fill:#dff5e3}
    .warn{fill:#fff1c7}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .ghost{fill:#f5f5f5;stroke:#555;stroke-width:2;stroke-dasharray:5 4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .small{font-size:14px}
    .label{font-size:17px}
    .title{font-size:20px;font-weight:700}
    .white{fill:#fff}
    .redText{fill:#b00020;font-weight:700}
    .greenText{fill:#147a2e;font-weight:700}
    .muted{fill:#555}
  </style>

  <text class="title" x="190" y="28">До: удаляем лист 20</text>
  <text class="title" x="570" y="28">После: ссылка родителя пустая</text>
  <line class="line" x1="190" y1="82" x2="100" y2="145"/>
  <line class="line" x1="190" y1="82" x2="280" y2="145"/>
  <line class="line" x1="100" y1="190" x2="60" y2="250"/>
  <line class="line" x1="100" y1="190" x2="140" y2="250"/>
  <circle class="node" cx="190" cy="70" r="24"/>
  <text class="" x="190" y="70">50</text>
  <circle class="node" cx="100" cy="175" r="24"/>
  <text class="" x="100" y="175">30</text>
  <circle class="node" cx="280" cy="175" r="24"/>
  <text class="" x="280" y="175">70</text>
  <circle class="node warn" cx="60" cy="270" r="24"/>
  <text class="" x="60" y="270">20</text>
  <circle class="node" cx="140" cy="270" r="24"/>
  <text class="" x="140" y="270">40</text>
  <path class="line" d="M 72 252 L 95 232" marker-end="url(#arrow)"/>
  <text class="redText" x="60" y="320">удалить</text>
  <line class="line" x1="570" y1="82" x2="480" y2="145"/>
  <line class="line" x1="570" y1="82" x2="660" y2="145"/>
  <line class="line" x1="480" y1="190" x2="520" y2="250"/>
  <circle class="node" cx="570" cy="70" r="24"/>
  <text class="" x="570" y="70">50</text>
  <circle class="node" cx="480" cy="175" r="24"/>
  <text class="" x="480" y="175">30</text>
  <circle class="node" cx="660" cy="175" r="24"/>
  <text class="" x="660" y="175">70</text>
  <circle class="node" cx="520" cy="270" r="24"/>
  <text class="" x="520" y="270">40</text>
  <text class="muted" x="440" y="270">∅</text>

</svg>
