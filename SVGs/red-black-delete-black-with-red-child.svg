<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380" role="img" aria-labelledby="title desc">
  <title id="title">Red-Black delete — черная вершина с красным ребенком</title>
  <desc id="desc">Удаляемая черная вершина заменяется красным ребенком, которого перекрашивают в черный.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect width="820" height="380" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:21px;font-weight:700}
    .small{font-size:14px}
    .white{fill:#fff}
    .ok{fill:#147a2e;font-weight:700}
  </style>
  <text class="title" x="410" y="32">Удаление: черная вершина имеет красного ребенка</text>
  <line class="line" x1="230" y1="92" x2="150" y2="160"/>
  <line class="line" x1="150" y1="208" x2="100" y2="270"/>
  <circle class="black" cx="230" cy="80" r="24"/><text class="white" x="230" y="80">P</text>
  <circle class="black" cx="150" cy="185" r="24"/><text class="white" x="150" y="185">X</text>
  <circle class="red" cx="100" cy="290" r="24"/><text class="white" x="100" y="290">C</text>
  <text class="small" x="150" y="240">удаляем X</text>
  <path class="line" d="M 330 190 C 410 130, 490 130, 570 180" marker-end="url(#arrow)"/>
  <line class="line" x1="650" y1="92" x2="570" y2="160"/>
  <circle class="black" cx="650" cy="80" r="24"/><text class="white" x="650" y="80">P</text>
  <circle class="black" cx="570" cy="185" r="24"/><text class="white" x="570" y="185">C</text>
  <text class="ok" x="410" y="335">C заменяет X и перекрашивается в черный</text>
</svg>
