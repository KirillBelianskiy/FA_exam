  <path class="line" d="M 394 79 C 443 92, 479 120, 496 151" marker-end="url(#arrow)"/>
  <path class="line" d="M 489 198 C 469 224, 450 247, 434 263" marker-end="url(#arrow)"/>
  <path class="line" d="M 450 292 C 505 307, 570 330, 618 348" marker-end="url(#arrow)"/>
