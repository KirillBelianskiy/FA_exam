<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Свойство декартова дерева: ключ и приоритет</title>
  <desc id="desc">Учебная схема: свойство декартова дерева по ключу и приоритету</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="420" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#555;stroke-width:2;fill:none;stroke-dasharray:5 5}
    .node{stroke:#111;stroke-width:2.2;fill:#fff}
    .hl{fill:#e8f2ff}
    .new{fill:#dff5e3}
    .warn{fill:#fff1c7}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .ghost{fill:#f5f5f5;stroke:#555;stroke-width:2;stroke-dasharray:5 4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .small{font-size:14px}
    .label{font-size:17px}
    .title{font-size:20px;font-weight:700}
    .white{fill:#fff}
    .redText{fill:#b00020;font-weight:700}
    .greenText{fill:#147a2e;font-weight:700}
    .muted{fill:#555}
  </style>

  <text class="title" x="380" y="28">Декартово дерево: ключи как поиск, приоритеты как куча</text>
  <line class="line" x1="380" y1="92" x2="250" y2="160"/>
  <line class="line" x1="380" y1="92" x2="510" y2="160"/>
  <line class="line" x1="250" y1="205" x2="190" y2="265"/>
  <line class="line" x1="250" y1="205" x2="310" y2="265"/>
  <line class="line" x1="510" y1="205" x2="450" y2="265"/>
  <line class="line" x1="510" y1="205" x2="570" y2="265"/>
  <circle class="node hl" cx="380" cy="80" r="34"/>
  <text class="small" x="380" y="80">50 / 12</text>
  <circle class="node" cx="250" cy="185" r="34"/>
  <text class="small" x="250" y="185">30 / 18</text>
  <circle class="node" cx="510" cy="185" r="34"/>
  <text class="small" x="510" y="185">70 / 20</text>
  <circle class="node" cx="190" cy="285" r="34"/>
  <text class="small" x="190" y="285">20 / 31</text>
  <circle class="node" cx="310" cy="285" r="34"/>
  <text class="small" x="310" y="285">40 / 25</text>
  <circle class="node" cx="450" cy="285" r="34"/>
  <text class="small" x="450" y="285">60 / 27</text>
  <circle class="node" cx="570" cy="285" r="34"/>
  <text class="small" x="570" y="285">80 / 33</text>
  <text class="label" x="380" y="360">По ключу: слева меньше, справа больше</text>
  <text class="label" x="380" y="384">По приоритету: у родителя приоритет меньше, чем у детей</text>

</svg>
