<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" width="900" height="410" role="img" aria-labelledby="title desc">
  <title id="title">AVL LR case — левый-правый случай</title>
  <desc id="desc">Учебная схема: AVL LR case — левый-правый случай</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="410" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#555;stroke-width:2;fill:none;stroke-dasharray:5 5}
    .node{stroke:#111;stroke-width:2.2;fill:#fff}
    .hl{fill:#e8f2ff}
    .new{fill:#dff5e3}
    .warn{fill:#fff1c7}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .ghost{fill:#f5f5f5;stroke:#555;stroke-width:2;stroke-dasharray:5 4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .small{font-size:14px}
    .label{font-size:17px}
    .title{font-size:20px;font-weight:700}
    .white{fill:#fff}
    .redText{fill:#b00020;font-weight:700}
    .greenText{fill:#147a2e;font-weight:700}
    .muted{fill:#555}
  </style>

  <text class="title" x="225" y="28">LR: тяжёлый путь слева-справа</text>
  <text class="title" x="675" y="28">Два шага: левый(y), потом правый(z)</text>
  <line class="line" x1="225" y1="82" x2="125" y2="150"/>
  <line class="line" x1="225" y1="82" x2="325" y2="150"/>
  <line class="line" x1="125" y1="198" x2="75" y2="255"/>
  <line class="line" x1="125" y1="198" x2="175" y2="255"/>
  <circle class="node warn" cx="225" cy="70" r="31"/>
  <text class="small" x="225" y="70"><tspan x="225" y="62">z</tspan><tspan x="225" y="78">бал=2</tspan></text>
  <circle class="node hl" cx="125" cy="175" r="31"/>
  <text class="small" x="125" y="175"><tspan x="125" y="167">y</tspan><tspan x="125" y="183">бал=-1</tspan></text>
  <circle class="ghost" cx="325" cy="175" r="22"/>
  <text class="small" x="325" y="175">T4</text>
  <circle class="ghost" cx="75" cy="275" r="22"/>
  <text class="small" x="75" y="275">T1</text>
  <circle class="node new" cx="175" cy="275" r="24"/>
  <text class="" x="175" y="275">x</text>
  <path class="line" d="M 395 175 C 470 110, 540 110, 605 165" marker-end="url(#arrow)"/>
  <text class="small" x="450" y="105">двойной поворот</text>
  <line class="line" x1="675" y1="82" x2="575" y2="150"/>
  <line class="line" x1="675" y1="82" x2="775" y2="150"/>
  <line class="line" x1="575" y1="195" x2="525" y2="255"/>
  <line class="line" x1="575" y1="195" x2="625" y2="255"/>
  <line class="line" x1="775" y1="195" x2="725" y2="255"/>
  <line class="line" x1="775" y1="195" x2="825" y2="255"/>
  <circle class="node new" cx="675" cy="70" r="24"/>
  <text class="" x="675" y="70">x</text>
  <circle class="node" cx="575" cy="175" r="24"/>
  <text class="" x="575" y="175">y</text>
  <circle class="node" cx="775" cy="175" r="24"/>
  <text class="" x="775" y="175">z</text>
  <circle class="ghost" cx="525" cy="275" r="22"/>
  <text class="small" x="525" y="275">T1</text>
  <circle class="ghost" cx="625" cy="275" r="22"/>
  <text class="small" x="625" y="275">T2</text>
  <circle class="ghost" cx="725" cy="275" r="22"/>
  <text class="small" x="725" y="275">T3</text>
  <circle class="ghost" cx="825" cy="275" r="22"/>
  <text class="small" x="825" y="275">T4</text>
  <text class="small" x="675" y="365">x поднимается между y и z; порядок ключей сохраняется</text>

</svg>
