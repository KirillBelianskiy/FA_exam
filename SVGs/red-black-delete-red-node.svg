<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" width="780" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Red-Black delete — удаление красной вершины</title>
  <desc id="desc">Если фактически удаляется красная вершина, черная высота не меняется и исправление не нужно.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect width="780" height="360" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round}
    .cut{stroke:#b00020;stroke-width:4;fill:none;stroke-linecap:round}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:21px;font-weight:700}
    .white{fill:#fff}
    .ok{fill:#147a2e;font-weight:700}
  </style>
  <text class="title" x="390" y="32">Удаление: фактически удалена красная вершина</text>
  <line class="line" x1="235" y1="92" x2="155" y2="160"/>
  <line class="line" x1="235" y1="92" x2="315" y2="160"/>
  <circle class="black" cx="235" cy="80" r="24"/><text class="white" x="235" y="80">P</text>
  <circle class="red" cx="155" cy="185" r="24"/><text class="white" x="155" y="185">X</text>
  <circle class="black" cx="315" cy="185" r="24"/><text class="white" x="315" y="185">S</text>
  <line class="cut" x1="132" y1="162" x2="178" y2="208"/>
  <line class="cut" x1="178" y1="162" x2="132" y2="208"/>
  <path class="line" d="M 370 180 C 430 130, 500 130, 560 170" marker-end="url(#arrow)"/>
  <line class="line" x1="625" y1="92" x2="705" y2="160"/>
  <circle class="black" cx="625" cy="80" r="24"/><text class="white" x="625" y="80">P</text>
  <circle class="black" cx="705" cy="185" r="24"/><text class="white" x="705" y="185">S</text>
  <text class="ok" x="390" y="310">Черная высота не изменилась: исправление не нужно</text>
</svg>
