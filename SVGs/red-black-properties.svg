<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Red-Black Tree properties — свойства красно-чёрного дерева</title>
  <desc id="desc">Учебная схема: Red-Black Tree properties — свойства красно-чёрного дерева</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="420" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#555;stroke-width:2;fill:none;stroke-dasharray:5 5}
    .node{stroke:#111;stroke-width:2.2;fill:#fff}
    .hl{fill:#e8f2ff}
    .new{fill:#dff5e3}
    .warn{fill:#fff1c7}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .ghost{fill:#f5f5f5;stroke:#555;stroke-width:2;stroke-dasharray:5 4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .small{font-size:14px}
    .label{font-size:17px}
    .title{font-size:20px;font-weight:700}
    .white{fill:#fff}
    .redText{fill:#b00020;font-weight:700}
    .greenText{fill:#147a2e;font-weight:700}
    .muted{fill:#555}
  </style>

  <text class="title" x="380" y="28">Красно-чёрное дерево: цвет + одинаковая чёрная высота</text>
  <line class="line" x1="380" y1="82" x2="250" y2="150"/>
  <line class="line" x1="380" y1="82" x2="510" y2="150"/>
  <line class="line" x1="250" y1="195" x2="190" y2="255"/>
  <line class="line" x1="250" y1="195" x2="310" y2="255"/>
  <line class="line" x1="510" y1="195" x2="450" y2="255"/>
  <line class="line" x1="510" y1="195" x2="570" y2="255"/>
  <circle class="black" cx="380" cy="70" r="24"/>
  <text class="white" x="380" y="70">40</text>
  <circle class="red" cx="250" cy="175" r="24"/>
  <text class="white" x="250" y="175">20</text>
  <circle class="red" cx="510" cy="175" r="24"/>
  <text class="white" x="510" y="175">60</text>
  <circle class="black" cx="190" cy="275" r="24"/>
  <text class="white" x="190" y="275">10</text>
  <circle class="black" cx="310" cy="275" r="24"/>
  <text class="white" x="310" y="275">30</text>
  <circle class="black" cx="450" cy="275" r="24"/>
  <text class="white" x="450" y="275">50</text>
  <circle class="black" cx="570" cy="275" r="24"/>
  <text class="white" x="570" y="275">70</text>
  <text class="label" x="380" y="345">1) корень чёрный</text>
  <text class="label" x="380" y="368">2) у красной вершины дети чёрные</text>
  <text class="label" x="380" y="391">3) на всех путях одинаковое число чёрных вершин</text>

</svg>
