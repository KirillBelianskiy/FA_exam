<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" width="780" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Splay zig — одиночный zig</title>
  <desc id="desc">Учебная схема: Splay zig — одиночный zig</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="360" fill="#fff"/>
  <style>
    .line{stroke:#111;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#555;stroke-width:2;fill:none;stroke-dasharray:5 5}
    .node{stroke:#111;stroke-width:2.2;fill:#fff}
    .hl{fill:#e8f2ff}
    .new{fill:#dff5e3}
    .warn{fill:#fff1c7}
    .red{fill:#d62828;stroke:#111;stroke-width:2.2}
    .black{fill:#111;stroke:#111;stroke-width:2.2}
    .ghost{fill:#f5f5f5;stroke:#555;stroke-width:2;stroke-dasharray:5 4}
    text{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#111;text-anchor:middle;dominant-baseline:middle}
    .small{font-size:14px}
    .label{font-size:17px}
    .title{font-size:20px;font-weight:700}
    .white{fill:#fff}
    .redText{fill:#b00020;font-weight:700}
    .greenText{fill:#147a2e;font-weight:700}
    .muted{fill:#555}
  </style>

  <text class="title" x="195" y="28">До: x — ребёнок корня p</text>
  <text class="title" x="585" y="28">После: один поворот, x в корне</text>
  <line class="line" x1="195" y1="82" x2="105" y2="150"/>
  <line class="line" x1="195" y1="82" x2="285" y2="150"/>
  <line class="line" x1="105" y1="195" x2="65" y2="255"/>
  <line class="line" x1="105" y1="195" x2="145" y2="255"/>
  <circle class="node warn" cx="195" cy="70" r="24"/>
  <text class="" x="195" y="70">p</text>
  <circle class="node new" cx="105" cy="175" r="24"/>
  <text class="" x="105" y="175">x</text>
  <circle class="ghost" cx="285" cy="175" r="22"/>
  <text class="small" x="285" y="175">C</text>
  <circle class="ghost" cx="65" cy="275" r="22"/>
  <text class="small" x="65" y="275">A</text>
  <circle class="ghost" cx="145" cy="275" r="22"/>
  <text class="small" x="145" y="275">B</text>
  <path class="line" d="M 355 175 C 410 120, 460 120, 520 165" marker-end="url(#arrow)"/>
  <text class="small" x="405" y="105">правый поворот(p)</text>
  <line class="line" x1="585" y1="82" x2="495" y2="150"/>
  <line class="line" x1="585" y1="82" x2="675" y2="150"/>
  <line class="line" x1="675" y1="195" x2="635" y2="255"/>
  <line class="line" x1="675" y1="195" x2="715" y2="255"/>
  <circle class="node new" cx="585" cy="70" r="24"/>
  <text class="" x="585" y="70">x</text>
  <circle class="ghost" cx="495" cy="175" r="22"/>
  <text class="small" x="495" y="175">A</text>
  <circle class="node warn" cx="675" cy="175" r="24"/>
  <text class="" x="675" y="175">p</text>
  <circle class="ghost" cx="635" cy="275" r="22"/>
  <text class="small" x="635" y="275">B</text>
  <circle class="ghost" cx="715" cy="275" r="22"/>
  <text class="small" x="715" y="275">C</text>

</svg>
